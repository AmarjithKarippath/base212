services:
  db:
    container_name: base212-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: base212
      POSTGRES_PASSWORD: base212
      POSTGRES_DB: base212
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U base212 -d base212"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    container_name: base212-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost:3009
      GOOGLE_REDIRECT_URI: http://localhost:3009/api/auth/google/callback
      DATABASE_URL: postgresql://base212:base212@db:5432/base212
    ports:
      - "8008:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: base212-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3009:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
