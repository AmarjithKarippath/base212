services:
  backend:
    container_name: base212-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      FRONTEND_URL: http://localhost:3009
      GOOGLE_REDIRECT_URI: http://localhost:3009/api/auth/google/callback
    ports:
      - "8008:8000"
    restart: unless-stopped

  frontend:
    container_name: base212-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3009:80"
    depends_on:
      - backend
    restart: unless-stopped
