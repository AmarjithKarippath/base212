services:
  backend:
    container_name: base212-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      CORS_ORIGINS: https://www.base212.com,https://base212.com
    expose:
      - "8000"
    restart: always

  frontend:
    container_name: base212-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

  caddy:
    container_name: base212-caddy
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: always

volumes:
  caddy_data:
  caddy_config:
