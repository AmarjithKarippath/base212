services:
  db:
    container_name: base212-db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-base212}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-base212}
      POSTGRES_DB: ${POSTGRES_DB:-base212}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-base212} -d ${POSTGRES_DB:-base212}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

  backend:
    container_name: base212-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      CORS_ORIGINS: https://www.base212.com,https://base212.com
      GOOGLE_REDIRECT_URI: https://www.base212.com/api/auth/google/callback
      FRONTEND_URL: https://www.base212.com
      SESSION_COOKIE_SECURE: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-base212}:${POSTGRES_PASSWORD:-base212}@db:5432/${POSTGRES_DB:-base212}
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    container_name: base212-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3009:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
