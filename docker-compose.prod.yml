services:
  backend:
    container_name: base212-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      CORS_ORIGINS: https://www.base212.com,https://base212.com
    expose:
      - "8000"
    restart: always

  frontend:
    container_name: base212-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "127.0.0.1:3009:80"
    depends_on:
      - backend
    restart: always
